<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexus Sport - Ingresar</title>

  <link rel="stylesheet" href="static/css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>

<body data-page="login">

<header class="topbar" id="appHeader">
  <div class="topbar-inner">
    <div class="container topbar-row">
      <a class="brand" href="index.html" aria-label="Ir al inicio">
        <img class="brand-logo brand-logo--desktop" src="static/images/logo-desktop.svg" alt="Nexus Sport" />
        <img class="brand-logo brand-logo--mobile" src="static/images/isologo-mobile.svg" alt="Nexus Sport" />
      </a>
    </div>
  </div>
</header>

<main class="content">
  <div class="container">
    <section class="auth-card auth-card-login">
      <div class="auth-head">
        <h1>Ingresar</h1>
      </div>

      <div class="auth-form">
        <label class="field">
          <span>Usuario</span>
          <input
            id="loginUser"
            type="text"
            placeholder="Ej: maria"
            autocomplete="username"
          >
        </label>

        <label class="field">
          <span>Clave</span>
          <input
            id="loginPass"
            type="password"
            placeholder="Ingresá tu clave"
            autocomplete="current-password"
          >
        </label>

        <button class="btn-primary btn-lg auth-submit" id="btnLogin" type="button">
          Entrar
        </button>
      </div>

      <p class="auth-help">
        ¡Ante cualquier inconveniente contactanos
        <a href="mailto:info@nexus.com.ar">info@nexus.com.ar</a>
        o al
        <a href="https://wa.me/5492494505050" target="_blank" rel="noopener noreferrer">
          +54 9 2494 505050
        </a>
      </p>
    </section>

    <div class="toasts" id="toasts"></div>
  </div>
</main>

<script src="static/js/app.js"></script>

</body>
</html>
